# ========================================
# Project Permissions and Caps Entities
# ========================================

type ProjectManager @entity(immutable: false) {
  id: String! # taskManager-projectId-managerAddress (composite key)
  project: Project!
  manager: Bytes!
  managerUser: User
  isActive: Boolean! # true if currently a manager, false if removed
  addedAt: BigInt!
  addedAtBlock: BigInt!
  removedAt: BigInt
  removedAtBlock: BigInt
  lastUpdatedAt: BigInt!
  transactionHash: Bytes!
}

type ProjectRolePermission @entity(immutable: false) {
  id: String! # taskManager-projectId-hatId (composite key)
  project: Project!
  hatId: BigInt!
  mask: Int! # Permission bitmask (uint8: create=1, claim=2, review=4, assign=8, selfReview=16, budget=32, editMeta=64, editFull=128)
  canCreate: Boolean! # mask & 1
  canClaim: Boolean! # mask & 2
  canReview: Boolean! # mask & 4
  canAssign: Boolean! # mask & 8
  canSelfReview: Boolean! # mask & 16 — TaskPerm.SELF_REVIEW (review own submissions)
  canBudget: Boolean! # mask & 32 — TaskPerm.BUDGET (per-project override of global BUDGET grant)
  canEditMeta: Boolean! # mask & 64 — TaskPerm.EDIT_META (edit title/metadataHash post-claim)
  canEditFull: Boolean! # mask & 128 — TaskPerm.EDIT_FULL (edit payout+bounty+meta post-claim; strict superset of EDIT_META)
  setAt: BigInt!
  setAtBlock: BigInt!
  transactionHash: Bytes!
}

type ProjectBountyCap @entity(immutable: false) {
  id: String! # taskManager-projectId-tokenAddress (composite key)
  project: Project!
  token: Bytes! # ERC-20 token address
  cap: BigInt! # Current cap amount
  setAt: BigInt!
  setAtBlock: BigInt!
  transactionHash: Bytes!
  capChanges: [BountyCapChange!]! @derivedFrom(field: "bountyCap")
}

type ProjectCapChange @entity(immutable: true) {
  id: Bytes! # txHash-logIndex
  project: Project!
  oldCap: BigInt!
  newCap: BigInt!
  changedAt: BigInt!
  changedAtBlock: BigInt!
  transactionHash: Bytes!
}

type BountyCapChange @entity(immutable: true) {
  id: Bytes! # txHash-logIndex
  bountyCap: ProjectBountyCap!
  project: Project!
  token: Bytes!
  oldCap: BigInt!
  newCap: BigInt!
  changedAt: BigInt!
  changedAtBlock: BigInt!
  transactionHash: Bytes!
}

# ========================================
# TaskManager v4 — Folders + Global Role Permissions
# ========================================

"""
Immutable record of a folders-root revision emitted by TaskManager.setFolders().
Use these to render a revision log; current root is on Organization.foldersRoot.
"""
type FolderRootChange @entity(immutable: true) {
  id: Bytes! # txHash-logIndex
  organization: Organization!
  newRoot: Bytes! # bytes32 sha256 digest of the new IPFS root
  oldRoot: Bytes! # previous root (zero bytes if first emission)
  sender: Bytes! # _msgSender() from event — smart-wallet-aware "who edited"
  senderUser: User # nullable — populated only if sender is a known org member
  senderUsername: String
  changedAt: BigInt!
  changedAtBlock: BigInt!
  transactionHash: Bytes!
}

"""
Global TaskPerm grants set via setConfig(ROLE_PERM, ...) on TaskManager.
Distinct from per-project grants (see ProjectRolePermission); a hat may hold
TaskPerm.BUDGET (or any other bit) globally without per-project entries.
mask=0 means the hat was revoked.
"""
type GlobalRolePermission @entity(immutable: false) {
  id: String! # taskManager-hatId (composite key for cross-org isolation)
  taskManager: TaskManager!
  hatId: BigInt!
  mask: Int! # uint8 (CREATE=1, CLAIM=2, REVIEW=4, ASSIGN=8, SELF_REVIEW=16, BUDGET=32, EDIT_META=64, EDIT_FULL=128)
  canCreate: Boolean! # mask & 1
  canClaim: Boolean! # mask & 2
  canReview: Boolean! # mask & 4
  canAssign: Boolean! # mask & 8
  canSelfReview: Boolean! # mask & 16
  canBudget: Boolean! # mask & 32 — TaskPerm.BUDGET (resize project caps)
  canEditMeta: Boolean! # mask & 64 — TaskPerm.EDIT_META (edit title/metadataHash post-claim)
  canEditFull: Boolean! # mask & 128 — TaskPerm.EDIT_FULL (edit payout+bounty+meta post-claim; strict superset of EDIT_META)
  setAt: BigInt!
  setAtBlock: BigInt!
  transactionHash: Bytes!
}

