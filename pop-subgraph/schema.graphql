type Task @entity(immutable: false) {
  id: String! # taskManager-taskId
  taskId: BigInt!
  taskManager: Bytes!
  project: Project! # References composite Project ID (taskManager-projectId)
  payout: BigInt!
  bountyToken: Bytes!
  bountyPayout: BigInt!
  requiresApplication: Boolean!
  title: String! # task title
  metadataHash: Bytes! # task metadata hash (description, difficulty, estHours)
  submissionHash: Bytes # submission metadata hash (set when task is submitted)
  metadata: TaskMetadata # Link to task metadata from IPFS (updated to submission metadata when task is submitted)
  assignee: Bytes
  assigneeUsername: String
  assigneeUser: User
  completer: Bytes
  completerUsername: String
  completerUser: User
  canceller: Bytes
  cancellerUsername: String
  cancellerUser: User
  status: TaskStatus!
  createdAt: BigInt!
  createdAtBlock: BigInt!
  assignedAt: BigInt
  submittedAt: BigInt
  completedAt: BigInt
  cancelledAt: BigInt
  updatedAt: BigInt
  rejectionHash: Bytes # latest rejection metadata hash
  rejectionCount: Int!
  applications: [TaskApplication!]! @derivedFrom(field: "task")
  rejections: [TaskRejection!]! @derivedFrom(field: "task")
}

"""
Task metadata fetched from IPFS.
Contains task description, difficulty, estimated hours, and submission content.
"""
type TaskMetadata @entity(immutable: false) {
  id: String! # txHash-ipfsCid (e.g. 0xabc...-Qm...)
  task: Task # Link back to the task
  name: String # Task name from IPFS JSON
  description: String # Task description from IPFS JSON
  location: String # Task location/status from IPFS JSON
  difficulty: String # Task difficulty (easy, medium, hard, etc.)
  estimatedHours: BigDecimal # Estimated hours to complete (can be fractional, e.g. 0.5)
  submission: String # Submission content from IPFS JSON (for submission metadata)
  rejection: String # Rejection reason from IPFS JSON (for rejection metadata)
  indexedAt: BigInt # When this metadata was indexed
}

type TaskApplication @entity(immutable: false) {
  id: String! # taskManager-taskId-applicant
  task: Task!
  applicant: Bytes!
  applicantUsername: String
  applicantUser: User
  applicationHash: Bytes!
  metadata: TaskApplicationMetadata # IPFS-indexed content (notes, experience)
  approved: Boolean!
  approver: Bytes
  approverUsername: String
  approverUser: User
  appliedAt: BigInt!
  appliedAtBlock: BigInt!
