  standing: Boolean!
  hasSpecificRules: Boolean! # true if this wearer has custom rules, false if using defaults
  admin: Bytes # admin who set the eligibility
  adminUser: User
  adminUsername: String
  updatedAt: BigInt!
  updatedAtBlock: BigInt!
  transactionHash: Bytes!
