type Role @entity(immutable: false) {
  id: String! # orgId-hatId
  organization: Organization!
  hatId: BigInt!
  hat: Hat # Link to Hat entity (nullable until HatCreatedWithEligibility)

  # Role metadata from RolesCreated event
  name: String # Role name from smart contract
  image: String # Role image URL
  metadataCID: Bytes # IPFS CID for extended metadata
  canVote: Boolean # Whether this role can vote
  isUserRole: Boolean # True for user-defined roles (in roleHatIds), false for system hats (TopHat, AdminHat)

  # Timestamps
  createdAt: BigInt!
  createdAtBlock: BigInt!
  transactionHash: Bytes!

  # Derived relationships
  permissions: [HatPermission!]! @derivedFrom(field: "role")
  wearers: [RoleWearer!]! @derivedFrom(field: "role")
}

type RoleWearer @entity(immutable: false) {
  id: String! # orgId-hatId-wearer
  role: Role!
  user: User!
  wearer: Bytes!
  wearerUsername: String

  # Link to WearerEligibility if available (for eligibility status)
  wearerEligibility: WearerEligibility

  # Timestamps
  addedAt: BigInt!
  addedAtBlock: BigInt!
  removedAt: BigInt
  # True iff the wearer currently holds a positive Hats Protocol ERC-1155
  # balance for the hat (tracked via TransferSingle). Note: this does NOT
  # incorporate Hat.active or wearer-standing — Hats.isWearerOfHat semantics
  # require ANDing this flag with Hat.active and (if vouching is configured)
  # the linked WearerEligibility.eligible/standing.
  isActive: Boolean!
  transactionHash: Bytes!
}

# HatLookup — global hatId → org/role index used by the Hats Protocol
# TransferSingle handler. Hats events only carry the bare uint256 hatId;
# we need to resolve which org / role / Hat entity that id belongs to in
# our subgraph (without iterating). Populated whenever getOrCreateRole
# creates or loads a Role.
type HatLookup @entity(immutable: false) {
  id: String! # hatId.toString()
  hatId: BigInt!
  organization: Organization!
  role: Role!
  hat: Hat
}

