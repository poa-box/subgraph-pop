"""
IPFS-indexed org metadata content.
This entity is populated by a file data source that fetches from IPFS.
If IPFS is unavailable or slow, the main Organization entity will still be indexed
with the metadataHash - this entity will be populated when/if IPFS content becomes available.
"""
type OrgMetadata @entity(immutable: false) {
  id: String! # IPFS hash (CID)
  organization: Organization
  description: String
  template: String
  backgroundColor: String
  logo: String # IPFS CID of the org logo image
  hideTreasury: Boolean # If true, treasury section is hidden in the UI
  # When true, UI labels participation-token amounts using the token's
  # actual symbol (e.g. "REP") instead of the default "Shares". Stored
  # nullable so missing/old metadata defaults to "Shares" client-side.
  useTokenSymbol: Boolean
  # When true, task payouts ignore difficulty and are computed as
  # taskPayoutHourlyRate × estimated hours (the org "pay by hours only"
  # setting). Nullable so missing/old metadata defaults to false client-side.
  taskPayoutHoursOnly: Boolean
  # Tokens-per-hour rate used when taskPayoutHoursOnly is true. Can be
  # fractional (e.g. 12.5); frontend defaults to 10 when missing.
  taskPayoutHourlyRate: BigDecimal
  links: [OrgMetadataLink!]! @derivedFrom(field: "metadata")
  indexedAt: BigInt
}

type OrgMetadataLink @entity(immutable: true) {
  id: String! # metadataId-index
  metadata: OrgMetadata!
  name: String!
  url: String!
  index: Int!
}

type HatMetadata @entity(immutable: false) {
  id: String! # IPFS hash (CID)
  hat: Hat
  name: String # Role name fetched from IPFS JSON
  description: String # Fetched from IPFS JSON
  indexedAt: BigInt
}

"""
IPFS-indexed proposal metadata content.
This entity is populated by a file data source that fetches from IPFS.
Contains the proposal description and option names that were uploaded when creating the proposal.
If IPFS content is unavailable (404), this entity won't be created and the proposal.metadata
reference will point to a non-existent entity (queries will return null).
"""
type ProposalMetadata @entity(immutable: true) {
  id: String! # Proposal entity ID (contractAddress-proposalId)
  description: String! # Full proposal description text
  optionNames: [String!]! # Names for each voting option
  createdAt: BigInt # Timestamp from IPFS metadata
}

